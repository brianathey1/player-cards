<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Push AI Renaissance — Player Cards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cinzel+Decorative:wght@700;900&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap');
  :root{--gold:#e7b94a;--gold-deep:#a8761d;--teal:#3fd0c9;
    --sage:#6f8fe0;--artist:#e26ac0;--rogue:#54c878;--hero:#e0564b;--parch:#e9dcc0;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Spectral',serif;background:radial-gradient(120% 80% at 50% -10%,rgba(63,208,201,.10),transparent 55%),#07080d;color:var(--parch);padding:40px 22px 70px;}
  header{text-align:center;max-width:1100px;margin:0 auto 14px;}
  .eyebrow{font-family:'Cinzel',serif;font-weight:700;letter-spacing:.4em;font-size:12px;color:var(--teal);text-transform:uppercase;margin-bottom:10px;}
  h1{font-family:'Cinzel Decorative',serif;font-weight:900;font-size:46px;line-height:1;
    background:linear-gradient(180deg,#fff7e0,var(--gold) 55%,var(--gold-deep));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{font-style:italic;color:#cdbd97;margin-top:12px;font-size:15px;}
  .note{font-size:12px;color:#7e745a;margin-top:10px;}
  .dlall{display:inline-flex;align-items:center;gap:8px;margin-top:20px;font-family:'Cinzel',serif;font-weight:700;
    letter-spacing:.14em;font-size:12px;text-transform:uppercase;text-decoration:none;color:#07080d;
    background:linear-gradient(180deg,#fff7e0,var(--gold) 60%,var(--gold-deep));padding:11px 22px;border-radius:7px;
    box-shadow:0 6px 18px rgba(231,185,74,.28);transition:transform .15s ease,box-shadow .15s ease;}
  .dlall:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(231,185,74,.45);}
  .wrap{max-width:1180px;margin:0 auto;}
  section{margin-top:46px;}
  .clshead{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
  .clshead .dot{width:14px;height:14px;border-radius:50%;background:var(--c);box-shadow:0 0 14px var(--c);}
  .clshead h2{font-family:'Cinzel',serif;font-weight:900;letter-spacing:.12em;font-size:24px;color:#fff;text-transform:uppercase;}
  .clshead .role{font-style:italic;color:var(--c);font-size:14px;}
  .clshead .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--c),transparent);opacity:.5;}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
  @media(max-width:1000px){.grid{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:560px){.grid{grid-template-columns:repeat(2,1fr);}}
  .card{position:relative;border:1.5px solid var(--c);border-radius:9px;overflow:hidden;
    background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(0,0,0,.35));
    box-shadow:0 8px 22px rgba(0,0,0,.5),inset 0 0 26px color-mix(in srgb,var(--c) 22%,transparent);
    text-decoration:none;transition:transform .15s ease,box-shadow .15s ease;}
  .card:hover{transform:translateY(-4px);box-shadow:0 14px 30px rgba(0,0,0,.6),0 0 18px var(--c);}
  .card .pic{aspect-ratio:3/4;background:#0a0c14;overflow:hidden;}
  .card img{width:100%;height:100%;object-fit:cover;display:block;}
  .card .lab{font-family:'Cinzel',serif;font-weight:700;letter-spacing:.14em;font-size:11px;text-transform:uppercase;
    text-align:center;color:var(--c);padding:9px 4px 11px;}
  .dl{position:absolute;top:7px;right:7px;background:rgba(7,8,13,.78);color:var(--parch);font-family:'Cinzel',serif;
    font-size:9px;letter-spacing:.1em;padding:3px 7px;border-radius:4px;border:1px solid var(--c);opacity:0;transition:opacity .15s;}
  .card:hover .dl{opacity:1;}
</style>
</head>
<body>
  <header>
    <div class="eyebrow">✦ Push AI Renaissance ✦</div>
    <h1>Player Cards</h1>
    <p class="sub">Six action variants per guide — for scenarios throughout the Chronicle.</p>
    <p class="note">Click any card to download the full-resolution image. Joe Mad / comic-anime style.</p>
    <a class="dlall" href="player-cards-all.zip" download>⬇ Download all 24 cards (.zip)</a>
  </header>
  <div class="wrap" id="wrap"></div>

<script>
const ACTIONS=[
  {label:"Battle",slug:"battle"},
  {label:"Solving Puzzles",slug:"solving"},
  {label:"Conjuring",slug:"conjuring"},
  {label:"Healing",slug:"healing"},
  {label:"Special Power",slug:"special"},
  {label:"Victorious",slug:"victorious"}];
const DATA=[
  {name:"The Sage",role:"Keeper of wisdom",cls:"sage"},
  {name:"The Artist",role:"Maker of beautiful things",cls:"artist"},
  {name:"The Rogue",role:"Allergic to wasted motion",cls:"rogue"},
  {name:"The Fallen Hero",role:"Relearning trust in the machines",cls:"hero"},
];
const wrap=document.getElementById("wrap");
DATA.forEach(c=>{
  const s=document.createElement("section");
  s.style.setProperty("--c",`var(--${c.cls})`);
  s.innerHTML=`<div class="clshead" style="--c:var(--${c.cls})">
      <span class="dot"></span><h2>${c.name}</h2><span class="role">${c.role}</span><span class="ln"></span></div>
    <div class="grid">${ACTIONS.map(a=>{
      const file=`images/${c.cls}-${a.slug}.png`;
      const dlname=`${c.cls}-${a.slug}.png`;
      return `
      <a class="card" style="--c:var(--${c.cls})" href="${file}" download="${dlname}">
        <span class="dl">DOWNLOAD ↓</span>
        <div class="pic"><img loading="lazy" src="${file}" alt="${c.name} — ${a.label}"></div>
        <div class="lab">${a.label}</div>
      </a>`;}).join("")}</div>`;
  wrap.appendChild(s);
});
</script>
</body>
</html>
